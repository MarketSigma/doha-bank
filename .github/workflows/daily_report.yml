      - name: Register draft report in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_PDF_URL: ${{ env.PUBLIC_PDF_URL }}
        run: |
          python3 - << 'PYEOF'
          import os
          import datetime
          from supabase import create_client

          sb = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          )

          today = datetime.date.today().isoformat()
          pdf_url = os.environ["PUBLIC_PDF_URL"]

          payload = {
              "report_date": today,
              "title": f"Market Intelligence {today}",
              "pdf_url": pdf_url,
              "status": "draft"
          }

          existing = (
              sb.table("reports")
              .select("id")
              .eq("report_date", today)
              .limit(1)
              .execute()
          )

          rows = existing.data or []

          if rows:
              sb.table("reports").update(payload).eq("id", rows[0]["id"]).execute()
              print(f"[INFO] Updated draft report for {today}")
          else:
              sb.table("reports").insert(payload).execute()
              print(f"[INFO] Inserted draft report for {today}")
          PYEOF
