name: Market Intelligence Daily Report

on:
  schedule:
    # GitHub scheduled workflows cannot read a dynamic cron from Supabase.
    # Therefore this workflow wakes up every 5 minutes and check_email_schedule.py
    # decides whether the saved Qatar-time schedule is due.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-intelligence-daily-report
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      RUN_WEEKDAYS_ONLY: "true"
      SCHEDULE_WINDOW_MINUTES: "5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-crosextra-carlito fonts-crosextra-caladea

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic>=0.25.0 yfinance>=0.2.40 feedparser>=6.0.11 requests>=2.31.0 reportlab>=4.0.0 pandas>=2.0.0 supabase>=2.0.0

      - name: Check client email schedule
        id: schedule_check
        run: |
          python3 check_email_schedule.py

      - name: Stop if schedule is not due
        if: steps.schedule_check.outputs.run_report != 'true'
        run: |
          echo "Report is not due now. No generation or email sending required."
          echo "Reason: ${{ steps.schedule_check.outputs.reason }}"
          echo "Saved time: ${{ steps.schedule_check.outputs.saved_time }}"
          echo "Current Qatar time: ${{ steps.schedule_check.outputs.current_qatar_time }}"

      - name: Fetch market data and news
        if: steps.schedule_check.outputs.run_report == 'true'
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          python3 fetcher.py

      - name: Run validation for information only
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          if [ -f validate_report.py ]; then
            python3 validate_report.py market_data.json || echo "[WARN] Validation reported issues, continuing because Phase 1 dispatch is not validation-gated."
          else
            echo "validate_report.py not found. Skipping external validation step."
          fi

      - name: Generate PDF report
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          python3 pdf_generator.py market_data.json report.pdf

      - name: Generate HTML report
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          python3 html_generator.py market_data.json report.html

      - name: Copy live files to dashboard docs
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          mkdir -p docs
          cp market_data.json docs/market_data.json
          cp report.pdf docs/report.pdf
          cp report.html docs/report.html

      - name: Register generated report in dashboard
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          if [ -f update_report_record.py ]; then
            python3 update_report_record.py || echo "[WARN] Report record update failed, continuing because email dispatch uses local report.pdf."
          else
            echo "update_report_record.py not found. Skipping report table registration."
          fi

      - name: Send email automatically
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          python3 send_email.py

      - name: Commit generated files
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add market_data.json report.pdf report.html docs/market_data.json docs/report.pdf docs/report.html docs/index.html || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Update and email market intelligence report"
            git push
          fi

      - name: Phase 1 dispatch summary
        if: steps.schedule_check.outputs.run_report == 'true'
        run: |
          echo "Report generated from Supabase data and emailed automatically."
          echo "Validation warnings, if any, were retained for dashboard visibility only."
          echo "Approval is not required in Phase 1."

    
