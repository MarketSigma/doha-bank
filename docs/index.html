<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doha Bank Market Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a2a3a}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .header{background:#0d2c5e;color:#fff}.header-inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:14px}.logo{width:38px;height:38px;border-radius:6px;background:#fff;color:#1a5fa8;border:1px solid #00aeef;display:flex;align-items:center;justify-content:center;font-weight:700}
    .cyanbar{height:3px;background:#00aeef}.tabs{display:flex;gap:2px;background:#fff;border-bottom:1px solid #c5d8ee;padding:0 24px}.tab{padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;color:#5a7a96;font-size:13px;font-weight:600}.tab.active{color:#1a5fa8;border-color:#1a5fa8}
    .card{background:#fff;border:1px solid #c5d8ee;border-radius:8px;padding:18px;margin-bottom:16px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
    .kpi{background:#fff;border:1px solid #c5d8ee;border-radius:8px;padding:12px 14px;border-top:3px solid #00aeef}.kval{font-size:18px;font-weight:700;color:#0d2c5e}.klbl{font-size:11px;font-weight:700;margin-top:4px}.ksub{font-size:10px;color:#5a7a96;margin-top:2px}
    table{width:100%;border-collapse:collapse;font-size:12px} thead tr{background:#0d2c5e} th{padding:7px 10px;text-align:left;color:#fff;font-size:11px} th.r{text-align:right} td{padding:6px 10px;border-bottom:1px solid #c5d8ee}
    td.r{text-align:right} tbody tr:nth-child(odd){background:#f5f8fc}.sec{display:flex;align-items:center;gap:8px;margin-bottom:10px}.line{width:3px;height:16px;background:#00aeef;border-radius:2px}.sectitle{font-size:11px;font-weight:700;color:#1a5fa8;letter-spacing:1px;text-transform:uppercase}
    .news-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.news-card{background:#fff;border:1px solid #c5d8ee;border-radius:6px;display:flex;overflow:hidden;border-top:2px solid #00aeef}
    .news-body{flex:1;padding:10px 12px}.news-title{font-size:12px;font-weight:700;color:#0d2c5e;margin-bottom:4px;line-height:1.35}.news-source{font-size:11px;font-weight:700;color:#00aeef;margin-bottom:4px}.news-sum{font-size:11px;color:#5a7a96;line-height:1.45}
    .news-badge{width:74px;min-width:74px;background:#0d2c5e;border-left:2px solid #00aeef;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8px 4px}
    .news-metric{font-size:12px;font-weight:700;color:#00aeef;text-align:center;line-height:1.2;margin-bottom:4px}.news-mlbl{font-size:9px;color:#9ac4e8;text-align:center;line-height:1.25}
    .btn{padding:8px 14px;border:none;border-radius:6px;background:#1a5fa8;color:#fff;font-size:12px;font-weight:700;cursor:pointer}.btn.alt{background:#6c757d}.btn.danger{background:#c0392b}
    .row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:8px}.input,select{width:100%;padding:8px 10px;border:1px solid #c5d8ee;border-radius:6px;font-size:13px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700}.ok{background:#edf7f1;color:#1a7a45}.bad{background:#faedef;color:#c0392b}
    .muted{color:#5a7a96;font-size:12px}.empty{padding:24px;text-align:center;color:#5a7a96}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d2c5e}.loginbox{background:#fff;border-radius:12px;padding:36px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
    .flex{display:flex;align-items:center;justify-content:space-between;gap:12px}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const PASS_HASH = "db_mi_2026";
const SUPABASE_URL = "https://wanqirnlsnfrrzvkxeby.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_w77b_FV1Xor8rubRqczyGg__P9NJ9We";
const sb = (SUPABASE_URL.startsWith("http") && !SUPABASE_ANON_KEY.startsWith("PASTE_")) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const state = {
  loggedIn: sessionStorage.getItem("db_logged_in") === "1",
  tab: "Market Snapshot",
  market: null,
  recipients: [],
  logs: [],
};

const app = document.getElementById("app");

function pctColor(v){
  v = String(v || "");
  if(v.startsWith("+")) return "#1a7a45";
  if(v.startsWith("-")) return "#c0392b";
  return "#5a7a96";
}

function formatPx(v){
  if(typeof v === "number") return v.toLocaleString(undefined, {maximumFractionDigits: 2, minimumFractionDigits: 2});
  return v ?? "N/A";
}

function render(){
  app.innerHTML = "";
  if(!state.loggedIn){
    return renderLogin();
  }

  const root = document.createElement("div");
  root.innerHTML = `
    <div class="header">
      <div class="header-inner">
        <div class="brand">
          <div class="logo">D</div>
          <div>
            <div style="font-size:10px;color:#9ac4e8">بنك الدوحة</div>
            <div style="font-size:14px;font-weight:700;letter-spacing:1px">DOHA BANK</div>
          </div>
          <div style="width:1px;height:28px;background:rgba(255,255,255,.2);margin:0 8px"></div>
          <div style="font-size:14px;font-weight:700;letter-spacing:1px">Market Intelligence Dashboard</div>
        </div>
        <button class="btn alt" id="logoutBtn">Sign out</button>
      </div>
    </div>
    <div class="cyanbar"></div>
    <div class="tabs">
      ${["Market Snapshot","Recipients","Report Log"].map(t=>`<div class="tab ${state.tab===t?'active':''}" data-tab="${t}">${t}</div>`).join("")}
    </div>
    <div class="wrap" id="content"></div>
  `;
  app.appendChild(root);

  document.querySelectorAll(".tab").forEach(el => el.onclick = () => { state.tab = el.dataset.tab; render(); });
  document.getElementById("logoutBtn").onclick = () => { sessionStorage.removeItem("db_logged_in"); state.loggedIn = false; render(); };

  const content = document.getElementById("content");
  if(state.tab === "Market Snapshot") renderMarket(content);
  if(state.tab === "Recipients") renderRecipients(content);
  if(state.tab === "Report Log") renderLogs(content);
}

function renderLogin(){
  const div = document.createElement("div");
  div.className = "login";
  div.innerHTML = `
    <div class="loginbox">
      <div style="text-align:center;margin-bottom:24px">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px">
          <div class="logo" style="width:44px;height:44px;border-width:2px">D</div>
          <div>
            <div style="font-size:9px;color:#5a7a96">بنك الدوحة</div>
            <div style="font-size:16px;font-weight:700;color:#0d2c5e">DOHA BANK</div>
          </div>
        </div>
        <div style="font-size:16px;font-weight:700;color:#0d2c5e">Market Intelligence</div>
        <div class="muted" style="margin-top:4px">Dashboard Staff Access</div>
      </div>
      <div style="margin-bottom:8px;font-size:12px;font-weight:700;color:#0d2c5e">Password</div>
      <input id="pw" class="input" type="password" placeholder="Enter dashboard password" />
      <div id="err" style="color:#c0392b;font-size:11px;margin-top:6px;display:none">Incorrect password</div>
      <button class="btn" id="loginBtn" style="width:100%;margin-top:14px">Sign In</button>
    </div>
  `;
  app.appendChild(div);
  document.getElementById("loginBtn").onclick = () => {
    const pw = document.getElementById("pw").value;
    if(pw === PASS_HASH){
      sessionStorage.setItem("db_logged_in","1");
      state.loggedIn = true;
      init();
    } else {
      document.getElementById("err").style.display = "block";
    }
  };
}

function renderMarket(container){
  if(!state.market){
    container.innerHTML = `<div class="card">Loading live market data...</div>`;
    return;
  }

  const d = state.market;
  const kpis = d.kpis || [];
  const globalNews = d.global_news || [];
  const qatarNews = d.qatar_news || [];

  container.innerHTML = `
    <div class="flex" style="margin-bottom:16px">
      <div class="muted">Last updated: ${d.generated_at ? new Date(d.generated_at).toLocaleString() : "N/A"}</div>
      <div class="badge ok">Live Data</div>
    </div>

    <div class="grid6">
      ${kpis.map(k => `
        <div class="kpi">
          <div class="kval" style="color:${String(k.value||'').startsWith('+') ? '#1a7a45' : String(k.value||'').startsWith('-') ? '#c0392b' : '#0d2c5e'}">${k.value ?? "N/A"}</div>
          <div class="klbl">${k.label ?? ""}</div>
          <div class="ksub">${k.sublabel ?? ""}</div>
        </div>
      `).join("")}
    </div>

    <div class="grid2" style="margin-top:16px">
      <div class="card">${tableSection("Global Indices", d.global_indices)}
                      ${tableSection("Spot Currency", d.spot_currency)}
                      ${tableSection("QAR Cross Rates", d.qar_cross_rates)}
                      ${tableSection("Fixed Income — UST Yields", d.fixed_income)}</div>
      <div class="card">${tableSection("GCC & Regional Indices", d.gcc_indices)}
                      ${tableSection("Qatari Banks", d.qatari_banks)}
                      ${tableSection("Commodities & Energy", d.commodities)}</div>
    </div>

    <div class="card">
      <div class="sec"><div class="line"></div><div class="sectitle">Regional & Global News</div></div>
      <div class="news-grid">${globalNews.map(newsCard).join("")}</div>
    </div>

    <div class="card">
      <div class="sec"><div class="line"></div><div class="sectitle">Qatar News</div></div>
      <div class="news-grid">${qatarNews.map(newsCard).join("")}</div>
    </div>
  `;
}

function tableSection(title, rows){
  const arr = Array.isArray(rows) ? rows : [];
  const hdr1 = title.includes("Fixed Income") ? "Yield" : "PX Last";
  return `
    <div style="margin-bottom:12px">
      <div class="sec"><div class="line"></div><div class="sectitle">${title}</div></div>
      <table>
        <thead><tr><th>${title.includes("Fixed Income") ? "Instrument" : (title.includes("Banks") ? "Bank" : (title.includes("Currency") || title.includes("Rates") ? "Pair" : (title.includes("Commodities") ? "Asset" : "Market / Index")))}</th><th class="r">${hdr1}</th><th class="r">1D %</th><th class="r">MTD %</th><th class="r">YTD %</th></tr></thead>
        <tbody>
          ${arr.length ? arr.map(r => `
            <tr>
              <td><strong>${r.name ?? ""}</strong></td>
              <td class="r">${formatPx(r.px_last)}</td>
              <td class="r" style="color:${pctColor(r.change_1d)}">${r.change_1d ?? "N/A"}</td>
              <td class="r" style="color:${pctColor(r.mtd)}">${r.mtd ?? "N/A"}</td>
              <td class="r" style="color:${pctColor(r.ytd)}">${r.ytd ?? "N/A"}</td>
            </tr>
          `).join("") : `<tr><td colspan="5" class="empty">No data</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function newsCard(item){
  return `
    <div class="news-card">
      <div class="news-body">
        <div class="news-title">${item.headline ?? ""}</div>
        <div class="news-source">${item.source ?? ""}</div>
        <div class="news-sum">${item.summary ?? ""}</div>
      </div>
      <div class="news-badge">
        <div class="news-metric">${item.metric ?? "—"}</div>
        <div class="news-mlbl">${item.metric_label ?? ""}</div>
      </div>
    </div>
  `;
}

function renderRecipients(container){
  if(!sb){
    container.innerHTML = `<div class="card">Set SUPABASE_URL and SUPABASE_ANON_KEY in docs/index.html first.</div>`;
    return;
  }

  const emails = state.recipients.filter(r => r.channel === "email");
  const whats = state.recipients.filter(r => r.channel === "whatsapp");

  container.innerHTML = `
    <div class="grid2">
      <div class="card">
        <div class="flex" style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#0d2c5e;text-transform:uppercase">WhatsApp Recipients (${whats.filter(x=>x.active).length} active)</div></div>
        ${recipientTable(whats, "whatsapp")}
        <div style="background:#f5f8fc;border:1px solid #c5d8ee;border-radius:6px;padding:14px;margin-top:12px">
          <div style="font-size:11px;font-weight:700;color:#0d2c5e;margin-bottom:10px;text-transform:uppercase">Add WhatsApp Recipient</div>
          <div class="row">
            <input class="input" id="wa_name" placeholder="Full name" />
            <input class="input" id="wa_number" placeholder="Number, example 97455512345" />
            <select id="wa_tier"><option>HNWI</option><option>VIP</option><option>Staff</option></select>
          </div>
          <button class="btn" id="addWaBtn">Add Recipient</button>
        </div>
      </div>

      <div class="card">
        <div class="flex" style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#0d2c5e;text-transform:uppercase">Email Recipients (${emails.filter(x=>x.active).length} active)</div></div>
        ${recipientTable(emails, "email")}
        <div style="background:#f5f8fc;border:1px solid #c5d8ee;border-radius:6px;padding:14px;margin-top:12px">
          <div style="font-size:11px;font-weight:700;color:#0d2c5e;margin-bottom:10px;text-transform:uppercase">Add Email Recipient</div>
          <div class="row" style="grid-template-columns:1fr 1fr">
            <input class="input" id="em_name" placeholder="Full name" />
            <input class="input" id="em_addr" placeholder="Email address" />
          </div>
          <button class="btn" id="addEmBtn">Add Recipient</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("addWaBtn").onclick = async () => {
    const name = document.getElementById("wa_name").value.trim();
    const phone_number = document.getElementById("wa_number").value.trim();
    const tier = document.getElementById("wa_tier").value;
    if(!name || !phone_number) return alert("Name and number are required.");
    await sb.from("recipients").insert([{name, channel:"whatsapp", phone_number, tier, active:true}]);
    await loadRecipients();
    render();
  };

  document.getElementById("addEmBtn").onclick = async () => {
    const name = document.getElementById("em_name").value.trim();
    const email = document.getElementById("em_addr").value.trim();
    if(!name || !email) return alert("Name and email are required.");
    await sb.from("recipients").insert([{name, channel:"email", email, tier:"HNWI", active:true}]);
    await loadRecipients();
    render();
  };

  document.querySelectorAll("[data-toggle-id]").forEach(el => {
    el.onclick = async () => {
      const id = el.dataset.toggleId;
      const active = el.dataset.active === "true";
      await sb.from("recipients").update({active: !active}).eq("id", id);
      await loadRecipients();
      render();
    };
  });

  document.querySelectorAll("[data-del-id]").forEach(el => {
    el.onclick = async () => {
      if(!confirm("Delete this recipient?")) return;
      await sb.from("recipients").delete().eq("id", el.dataset.delId);
      await loadRecipients();
      render();
    };
  });
}

function recipientTable(arr, kind){
  const isWa = kind === "whatsapp";
  return `
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>${isWa ? "Number" : "Email Address"}</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${arr.length ? arr.map(r => `
          <tr>
            <td><strong>${r.name ?? ""}</strong></td>
            <td>${isWa ? (r.phone_number ?? "") : (r.email ?? "")}</td>
            <td><span class="badge ${r.active ? 'ok':'bad'}">${r.active ? 'Active':'Paused'}</span></td>
            <td>
              <div style="display:flex;gap:6px">
                <button class="btn alt" data-toggle-id="${r.id}" data-active="${r.active}">${r.active ? 'Pause':'Resume'}</button>
                <button class="btn danger" data-del-id="${r.id}">Remove</button>
              </div>
            </td>
          </tr>
        `).join("") : `<tr><td colspan="4" class="empty">No recipients found</td></tr>`}
      </tbody>
    </table>
  `;
}

function renderLogs(container){
  container.innerHTML = `
    <div class="card">
      <div class="flex" style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:700;color:#0d2c5e;text-transform:uppercase">Report Delivery Log</div>
        <div class="muted">${state.logs.length} records</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Time</th><th>Status</th><th class="r">Email Count</th><th class="r">WhatsApp Count</th>
          </tr>
        </thead>
        <tbody>
          ${state.logs.length ? state.logs.map(r => `
            <tr>
              <td>${r.date ?? (r.report_date || "").slice(0,10)}</td>
              <td>${r.time ?? formatTime(r.sent_at)}</td>
              <td><span class="badge ${String(r.status).toLowerCase()==='success' ? 'ok':'bad'}">${r.status ?? "N/A"}</span></td>
              <td class="r">${r.email_count ?? 0}</td>
              <td class="r">${r.wa_count ?? 0}</td>
            </tr>
          `).join("") : `<tr><td colspan="5" class="empty">No delivery records yet</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function formatTime(v){
  if(!v) return "";
  try { return new Date(v).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
  catch { return ""; }
}

async function loadMarket(){
  try{
    const res = await fetch(`../market_data.json?_=${Date.now()}`, {cache: "no-store"});
    if(!res.ok) throw new Error("market_data.json not found");
    state.market = await res.json();
  } catch(e){
    console.error(e);
    state.market = null;
  }
}

async function loadRecipients(){
  if(!sb) return;
  const { data, error } = await sb.from("recipients").select("*").order("created_at", {ascending:false});
  if(error){ console.error(error); return; }
  state.recipients = data || [];
}

async function loadLogs(){
  if(sb){
    const { data, error } = await sb.from("send_log").select("*").order("sent_at", {ascending:false}).limit(30);
    if(!error && data){
      state.logs = data.map(r => ({
        ...r,
        date: r.report_date,
        time: formatTime(r.sent_at)
      }));
      return;
    }
  }

  try{
    const res = await fetch(`../send_log.json?_=${Date.now()}`, {cache:"no-store"});
    if(!res.ok) throw new Error("send_log.json not found");
    state.logs = await res.json();
  } catch(e){
    console.error(e);
    state.logs = [];
  }
}

async function init(){
  await Promise.all([loadMarket(), loadRecipients(), loadLogs()]);
  render();
}

init();
</script>
</body>
</html>
